# Netlify configuration for the landing site.
#
# This is a plain static site (no build step). All three domains point at this
# one deploy; per-domain branding is applied at runtime in /public/assets/main.js.

[build]
  # No build command — we publish the static files as-is.
  publish = "public"
  command = ""

# Belt-and-suspenders: make sure form submissions resolve even if a domain's
# DNS or framework routing ever gets in the way. Netlify Forms are detected
# from the static HTML in /public automatically; no extra config is required.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
